<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!--
    SVG sprite sheet — reference with <use href="/public/images/logo/spw-mark-symbol.svg#spw-mark">
    or inline this file once in the document and use <use href="#spw-mark">
  -->

  <symbol id="spw-mark" viewBox="0 0 48 52" fill="none">
    <title>Spwashi mark</title>
    <path
      id="mark-arc"
      class="mark-layer mark-layer--arc"
