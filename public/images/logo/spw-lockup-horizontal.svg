<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 52" fill="none"
  role="img" aria-labelledby="spw-lockup-h-title">
  <title id="spw-lockup-h-title">Spwashi</title>
  <!--
    Horizontal lockup: glyph (48px wide) + 16px gap + wordmark
    Wordmark: "Spwashi" in JetBrains Mono, aligned to cap-height baseline
  -->

  <!-- Glyph -->
  <g class="lockup-mark">
    <path
      class="mark-layer mark-layer--arc"
      d="M 8 20 Q 24 5 40 20"
      stroke="var(--spw-logo-stroke, currentColor)"
      stroke-width="var(--spw-logo-stroke-width, 2.4)"
      stroke-linecap="round"
      fill="none"
    />
    <path
      class="mark-layer mark-layer--w"
      d="M 8 26 L 16 46 L 24 26 L 32 46 L 40 26"
      stroke="var(--spw-logo-stroke, currentColor)"
      stroke-width="var(--spw-logo-stroke-width, 2.4)"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>

  <!-- Wordmark -->
  <text
    class="lockup-wordmark"
    x="64"
    y="36"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="22"
    font-weight="500"
    letter-spacing="0.02em"
    fill="var(--spw-logo-stroke, currentColor)"
  >Spwashi</text>
</svg>
