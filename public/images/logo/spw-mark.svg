<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 56" fill="none" aria-hidden="true">
  <!--
    Spwashi mark — two-layer glyph
    #mark-arc  : the overhead swoop / lasso (S-curve into omega)
    #mark-w    : the descent / w-shape below

    Layers are independently addressable by CSS and JS.
    Scale reference: designed at 48×56, works cleanly from 16px to 256px.
  -->

  <!-- Arc: sweeping left-right lasso that loops overhead and trails inward -->
  <path
    id="mark-arc"
    class="mark-layer mark-layer--arc"
    d="M 10 30 C 6 14 16 3 29 3 C 42 3 48 14 46 26 C 44 36 36 40 26 36"
    stroke="currentColor"
    stroke-width="2.4"
    stroke-linecap="round"
    fill="none"
  />

  <!-- W: the sharp zigzag descent — two V shapes forming the lower body -->
  <path
    id="mark-w"
    class="mark-layer mark-layer--w"
    d="M 12 34 L 19 52 L 27 40 L 35 52 L 42 34"
    stroke="currentColor"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
