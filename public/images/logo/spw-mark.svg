<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 52" fill="none"
  role="img" aria-labelledby="spw-mark-title spw-mark-desc">
  <title id="spw-mark-title">Spwashi mark</title>
  <desc id="spw-mark-desc">Two-stroke glyph: overhead arc (^) above descending W</desc>

  <!--
    Spwashi mark — two-layer glyph
    #mark-arc  : overhead swoop / lasso (structure, ^ operator)
    #mark-w    : descending zigzag / w-shape (action, ! operator)

    Addressable by CSS and JS via #mark-arc, #mark-w, .mark-layer--arc, .mark-layer--w
    CSS vars: --spw-logo-stroke (defaults currentColor), --spw-logo-stroke-width (defaults 2.4)
    Scale range: 16px → 256px
  -->

  <path
    id="mark-arc"
    class="mark-layer mark-layer--arc"
    d="M 8 20 Q 24 5 40 20"
    stroke="var(--spw-logo-stroke, currentColor)"
    stroke-width="var(--spw-logo-stroke-width, 2.4)"
    stroke-linecap="round"
    fill="none"
  />

  <path
    id="mark-w"
    class="mark-layer mark-layer--w"
    d="M 8 26 L 16 46 L 24 26 L 32 46 L 40 26"
    stroke="var(--spw-logo-stroke, currentColor)"
    stroke-width="var(--spw-logo-stroke-width, 2.4)"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
