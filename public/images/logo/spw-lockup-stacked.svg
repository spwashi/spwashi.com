<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 80" fill="none"
  role="img" aria-labelledby="spw-lockup-s-title">
  <title id="spw-lockup-s-title">Spwashi</title>
  <!--
    Stacked lockup: glyph centered on top, wordmark below
    Glyph horizontally centered in 96px wide canvas (offset: (96-32)/2 = 32)
    W spans x:8-40 in glyph coords → shift right by 24 to center in 96px
  -->

  <!-- Glyph (centered: translate x+24) -->
  <g class="lockup-mark" transform="translate(24 0)">
    <path
      class="mark-layer mark-layer--arc"
      d="M 8 20 Q 24 5 40 20"
      stroke="var(--spw-logo-stroke, currentColor)"
      stroke-width="var(--spw-logo-stroke-width, 2.4)"
      stroke-linecap="round"
      fill="none"
    />
    <path
      class="mark-layer mark-layer--w"
      d="M 8 26 L 16 46 L 24 26 L 32 46 L 40 26"
      stroke="var(--spw-logo-stroke, currentColor)"
      stroke-width="var(--spw-logo-stroke-width, 2.4)"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>

  <!-- Wordmark centered below -->
  <text
    class="lockup-wordmark"
    x="48"
    y="72"
    text-anchor="middle"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="16"
    font-weight="500"
    letter-spacing="0.04em"
    fill="var(--spw-logo-stroke, currentColor)"
  >Spwashi</text>
</svg>
